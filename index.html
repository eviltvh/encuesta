<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F0EAFF">
  <title>Te late ✦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F0EAFF;
      --bg-alt: #FFF8F0;
      --card: #FFFFFF;
      --border: #E0D5F5;
      --text: #2A2342;
      --text-muted: #7C7296;
      --accent: #B09BE0;
      --radius: 24px;
      --radius-sm: 16px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-ui: 'DM Sans', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      background-image:
        radial-gradient(circle at 1px 1px, rgba(176, 155, 224, 0.25) 1px, transparent 0);
      background-size: 22px 22px;
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .hub-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 24px 0 8px;
    }

    .hub-ornament {
      font-size: 20px;
      color: var(--accent);
      letter-spacing: 12px;
      margin-right: -12px;
    }

    .hub-header h1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .hub-header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hub-header p {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 280px;
      line-height: 1.4;
    }

    .hub-cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hub-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 20px 20px 22px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 10px 24px -14px rgba(42, 35, 66, 0.18);
      position: relative;
      overflow: hidden;
    }

    .hub-card:active {
      transform: translateY(2px) scale(0.985);
      box-shadow: 0 4px 12px -8px rgba(42, 35, 66, 0.2);
    }

    .hub-card-emoji {
      font-size: 48px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(42, 35, 66, 0.08));
    }

    .hub-card-body {
      flex: 1;
      min-width: 0;
    }

    .hub-card-body h2 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 26px;
      line-height: 1.05;
      margin-bottom: 2px;
    }

    .hub-card-body p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .hub-card-arrow {
      font-size: 22px;
      color: var(--accent);
      font-weight: 400;
      transition: transform 0.2s ease;
    }

    .hub-card:active .hub-card-arrow {
      transform: translateX(4px);
    }

    .hub-footer {
      text-align: center;
      padding: 16px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .hub-footer span { color: #E8A5C4; }
  </style>
</head>
<body>
  <main class="app">
    <header class="hub-header">
      <div class="hub-ornament" aria-hidden="true">✦ ✦ ✦</div>
      <h1>Te <em>late</em></h1>
      <p>Dinos qué te gusta y qué no. Dos minutos, easy.</p>
    </header>

    <section class="hub-cards">
      <a href="flores/" class="hub-card">
        <div class="hub-card-emoji" aria-hidden="true">🌸</div>
        <div class="hub-card-body">
          <h2>Flores</h2>
          <p>10 flores, ¿cuáles te laten?</p>
        </div>
        <div class="hub-card-arrow" aria-hidden="true">→</div>
      </a>

      <a href="lugares/" class="hub-card">
        <div class="hub-card-emoji" aria-hidden="true">🌳</div>
        <div class="hub-card-body">
          <h2>Lugares</h2>
          <p>10 sitios, ¿a cuál le entras?</p>
        </div>
        <div class="hub-card-arrow" aria-hidden="true">→</div>
      </a>
    </section>

    <footer class="hub-footer">
      <p>Hecho con <span>✿</span></p>
    </footer>
  </main>
</body>
</html>
